name: Build-Apk

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - run: chmod 777 ./gradlew

      - run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v7
        with:
          name: apk
          path: app/build/outputs/apk/debug/app-debug.apk
